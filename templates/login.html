{% extends "base.html" %}
{% block title %}Einloggen – Bewerbercheck-Pro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo"><img src="{{ url_for('static', filename='icon.svg') }}" width="48" height="48" alt="" class="auth-logo-img"> Bewerbercheck-Pro</div>
        <h1>Willkommen zurück</h1>
        <p class="auth-subtitle">Melden Sie sich in Ihrem Konto an.</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">E-Mail-Adresse</label>
                <input type="email" id="email" name="email" required
                       placeholder="ihre@email.de"
                       class="form-control" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="passwort">Passwort</label>
                <div class="password-wrapper">
                    <input type="password" id="passwort" name="passwort" required
                           class="form-control" autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePw('passwort', this)">Zeigen</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Einloggen
            </button>
        </form>

        <script nonce="{{ csp_nonce }}">
        function togglePw(id, btn) {
            var input = document.getElementById(id);
            if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Verbergen'; }
            else { input.type = 'password'; btn.textContent = 'Zeigen'; }
        }
        </script>

        <p class="auth-footer">
            <a href="{{ url_for('auth.passwort_vergessen') }}">Passwort vergessen?</a>
        </p>
        <p class="auth-footer">
            Noch kein Konto?
            <a href="{{ url_for('auth.register') }}"><strong>Kostenlos registrieren</strong></a>
        </p>
    </div>
</div>
{% endblock %}
