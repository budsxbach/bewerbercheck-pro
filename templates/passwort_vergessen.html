{% extends "base.html" %}
{% block title %}Passwort zurücksetzen – Bewerbercheck-Pro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">⚡ Bewerbercheck-Pro</div>
        <h1>Passwort zurücksetzen</h1>
        <p class="auth-subtitle">Geben Sie Ihre E-Mail-Adresse ein. Wir senden Ihnen einen Reset-Link.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">E-Mail-Adresse</label>
                <input type="email" id="email" name="email" required
                       placeholder="ihre@email.de"
                       class="form-control">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Reset-Link senden
            </button>
        </form>

        <p class="auth-footer">
            <a href="{{ url_for('auth.login') }}">Zurück zum Login</a>
        </p>
    </div>
</div>
{% endblock %}
