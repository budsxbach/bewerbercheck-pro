{% extends "base.html" %}
{% block title %}Registrieren – Bewerbercheck-Pro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo"><img src="{{ url_for('static', filename='icon.svg') }}" width="48" height="48" alt="" class="auth-logo-img"> Bewerbercheck-Pro</div>
        <h1>Konto erstellen</h1>
        <p class="auth-subtitle">14 Tage kostenlos testen – erst testen, dann zahlen.</p>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">Ihre E-Mail-Adresse</label>
                <input type="email" id="email" name="email" required
                       placeholder="firma@beispiel.de"
                       class="form-control" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="passwort">Passwort</label>
                <div class="password-wrapper">
                    <input type="password" id="passwort" name="passwort" required
                           placeholder="Mindestens 8 Zeichen"
                           class="form-control" autocomplete="new-password">
                    <button type="button" class="password-toggle">Zeigen</button>
                </div>
                <div class="password-strength" id="pwStrength">
                    <div class="strength-bar"><div class="strength-fill"></div></div>
                    <div class="strength-label"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="passwort2">Passwort bestätigen</label>
                <div class="password-wrapper">
                    <input type="password" id="passwort2" name="passwort2" required
                           placeholder="Passwort wiederholen"
                           class="form-control" autocomplete="new-password">
                    <button type="button" class="password-toggle">Zeigen</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Kostenlos registrieren
            </button>
        </form>

        <script nonce="{{ csp_nonce }}">
        // CSP-konformer Passwort-Toggle via addEventListener (kein onclick)
        document.querySelectorAll('.password-toggle').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var input = this.closest('.password-wrapper').querySelector('input');
                if (input.type === 'password') { input.type = 'text'; this.textContent = 'Verbergen'; }
                else { input.type = 'password'; this.textContent = 'Zeigen'; }
            });
        });
        document.getElementById('passwort').addEventListener('input', function() {
            var pw = this.value, score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            var el = document.getElementById('pwStrength');
            var labels = ['', 'Schwach', 'Mittel', 'Gut', 'Stark'];
            var classes = ['', 'strength-weak', 'strength-medium', 'strength-good', 'strength-strong'];
            el.className = 'password-strength ' + (classes[score] || '');
            el.querySelector('.strength-label').textContent = pw.length > 0 ? (labels[score] || 'Zu kurz') : '';
        });
        </script>

        <p class="auth-footer">
            Bereits ein Konto?
            <a href="{{ url_for('auth.login') }}"><strong>Jetzt einloggen</strong></a>
        </p>
    </div>
</div>
{% endblock %}
